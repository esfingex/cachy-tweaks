# ==============================================================================
#   cachy-gnome-tweaks - config/starship.toml
#   Description: Premium, ultra-clean, modern prompt design for devs
# ==============================================================================

# Get editor integrations working beautifully
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$package\
$node\
$rust\
$golang\
$python\
$nix_shell\
$conda\
$env_var\
$cmd_duration\
$line_break\
$jobs\
$character"""

# Use custom symbols and colors
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
vicmd_symbol = "[❮](bold yellow)"

[directory]
style = "bold cyan"
truncate_to_repo = true
truncation_length = 3
read_only = " 🔒"
read_only_style = "bold red"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "🍣 "
style = "bold magenta"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "[[($all_status$ahead_behind)]($style)] "
conflicted = "⚑"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
added = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "took [$duration]($style) "

[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = true

[hostname]
ssh_only = true
style = "bold dimmed white"
format = "@[$hostname]($style) "
disabled = false

# Languages / Runtimes configurations
[package]
symbol = "📦 "
style = "bold 208"
format = "is [$symbol$version]($style) "

[node]
symbol = "🟢 "
style = "bold green"
format = "via [$symbol($version)]($style) "

[rust]
symbol = "🦀 "
style = "bold red"
format = "via [$symbol($version)]($style) "

[golang]
symbol = "🐹 "
style = "bold cyan"
format = "via [$symbol($version)]($style) "

[python]
symbol = "🐍 "
style = "bold yellow"
format = "via [$symbol($version)]($style) "

[nix_shell]
symbol = "❄️ "
style = "bold blue"
format = "via [$symbol$state( ($name))]($style) "
