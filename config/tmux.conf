# ==============================================================================
#   cachy-gnome-tweaks - config/tmux.conf
#   Description: Premium, elegant, & high-performance tmux workspace configuration
# ==============================================================================

# -- General Settings ----------------------------------------------------------
# Set prefix to Ctrl-A (much easier to reach) while keeping Ctrl-B active
set -g prefix C-a
bind C-a send-prefix

# Start index from 1 instead of 0 for easier keyboard switching
set -g base-index 1
setw -g pane-base-index 1

# Automatically rename windows based on current command
setw -g automatic-rename on
set -g renumber-windows on

# Enable full 24-bit TrueColor and mouse support
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on

# Super fast escape response (critical for Neovim speed)
set -s escape-time 0
set -g history-limit 50000

# -- Key Bindings --------------------------------------------------------------
# Reload configuration easily with Prefix + r
bind r source-file ~/.tmux.conf \; display-message "✨ tmux configuration reloaded successfully!"

# Split panes using intuitive | and - keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes easily using Alt-Arrow keys without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use Vim-style keys in copy-mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# -- Premium Theme & Styling --------------------------------------------------
# Panes border colors
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#00f3ff" # Gorgeous futuristic cyan

# Status Bar Styling
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#111111,fg=#eeeeee" # Dark, sleek background

# Status left (Session Name)
set -g status-left-length 40
set -g status-left "#[bg=#00f3ff,fg=#000000,bold] ⚡ #S #[bg=default,fg=default] "

# Status right (Date / Time / Host)
set -g status-right-length 100
set -g status-right "#[fg=#888888]💻 #h #[fg=#ff007f]• #[fg=#eeeeee,bold]%Y-%m-%d %H:%M #[bg=#ff007f,fg=#ffffff,bold] 🕒 #[bg=default,fg=default]"

# Current Window Style
setw -g window-status-current-format "#[bg=#222222,fg=#00f3ff,bold] #I:#W#F #[bg=default,fg=default]"
setw -g window-status-format "#[fg=#666666] #I:#W #[fg=default]"

# Message bar styles
set -g message-style "bg=#ff007f,fg=#ffffff,bold"
